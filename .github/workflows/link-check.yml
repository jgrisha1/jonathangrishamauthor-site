name: Link Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1'   # Weekly Monday 9 AM UTC

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check links in HTML files
        uses: lycheeverse/lychee-action@v1
        with:
          args: >
            --verbose
            --no-progress
            --accept 200,201,202,204,301,302,403,429
            --exclude "amazon\.com"
            --exclude "mailto:"
            --exclude "localhost"
            --exclude "fonts\.googleapis\.com"
            --exclude "fonts\.gstatic\.com"
            './**/*.html'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
