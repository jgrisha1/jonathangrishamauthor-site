name: Lighthouse CI

on:
  push:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            https://jonathangrishamauthor.com/
            https://jonathangrishamauthor.com/books/angels
            https://jonathangrishamauthor.com/books/my-baby
            https://jonathangrishamauthor.com/books/kept-warm-for-the-mountain
            https://jonathangrishamauthor.com/books/spur
            https://jonathangrishamauthor.com/books/the-big-orange-monster-fucked-up
            https://jonathangrishamauthor.com/books/the-devil-finds-a-home
            https://jonathangrishamauthor.com/books/growing-up-independent-baptist
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 1
