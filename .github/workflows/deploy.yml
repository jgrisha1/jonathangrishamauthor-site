name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy to Cloudflare Workers
        run: npx wrangler@4 deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 99d1960e0d00c3b0688b0385bb625daa

      - name: Verify site is up
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://jonathangrishamauthor.com/)
          echo "Site returned HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: Site returned $STATUS after deploy!"
            exit 1
          fi
          echo "Site is up and returning 200 OK."
