name: Sync Books from Amazon

on:
  # Run nightly at 3am ET (8am UTC)
  schedule:
    - cron: '0 8 * * *'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run book sync script
        env:
          AMAZON_CLIENT_ID:     ${{ secrets.AMAZON_ACCESS_KEY }}
          AMAZON_CLIENT_SECRET: ${{ secrets.AMAZON_SECRET_KEY }}
          AMAZON_PARTNER_TAG: ${{ secrets.AMAZON_PARTNER_TAG }}
          AMAZON_REGION:      us-east-1
        run: node scripts/sync-books.js

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit new book files
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "auto: add new book(s) from Amazon PA API [$(date -u +%Y-%m-%d)]"
          git push

      - name: Deploy to Cloudflare Workers
        if: steps.changes.outputs.changed == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npm install -g wrangler@4
          wrangler deploy
